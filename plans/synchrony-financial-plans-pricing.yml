description: Synchrony's Credit Authorization, Quickscreen Apply, and Account Management APIs are merchant/retailer-partner integrations. Access is provisioned via developer.syf.com onboarding into a credit program contract; there is no published per-API price. Commercial terms (interchange, merchant servicing fees, program economics) are negotiated as part of the underlying retail credit program rather than charged per API call.
sources:
  - https://developer.syf.com/
  - https://developer.syf.com/our-products
  - https://www.synchrony.com
notes: No public API pricing page. APIs are bundled with Synchrony retail-credit-program contracts; revenue and fees flow through the credit program economics, not a per-call meter.
plans:
  - id: synchrony-financial-contact-sales
    name: Contact Sales
    type: enterprise
    description: Partner integration access bundled with a Synchrony retail-credit program. Pricing and program economics are negotiated per-merchant.
