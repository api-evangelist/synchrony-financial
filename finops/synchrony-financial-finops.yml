provider: Synchrony Financial
providerId: synchrony-financial
publisherName: Synchrony Bank
serviceCategory: Consumer Credit / Retail Finance
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Financial Services
  - Credit
  - Payments
  - FinOps
  - FOCUS
description: Synchrony's APIs are program-attached (retail credit, Quickscreen, account management); revenue moves through retail-credit program economics rather than a per-call API invoice, so FinOps mapping aligns to program-level merchant settlement rather than usage telemetry.
sources:
  - https://developer.syf.com/
  - https://www.synchrony.com
notes: No FOCUS-aligned per-call billing surface. Cost/revenue is reconciled at the retail-credit program level (interchange, merchant servicing, promotional financing terms) by the merchant's finance team.
billingModel:
  pricingCategory: Program-Attached (Retail Credit)
  billingFrequency: Per-Program Settlement
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Adjustment
    - Refund
focusColumns:
  ServiceName: Synchrony APIs
  ServiceCategory: Consumer Credit / Retail Finance
  ProviderName: Synchrony Financial
  PublisherName: Synchrony Bank
  InvoiceIssuerName: Synchrony Bank
  BillingCurrency: USD
meters:
  - name: credit_authorizations
    description: Credit authorization transactions submitted through the Authorization API.
    unit: transaction
    aggregation: sum
    dimensions:
      - merchant
      - channel
  - name: quickscreen_decisions
    description: Quickscreen preapproval decisions returned (soft credit pulls).
    unit: decision
    aggregation: sum
    dimensions:
      - merchant
  - name: account_servicing_calls
    description: Account-management API calls supporting cardholder servicing.
    unit: request
    aggregation: sum
    dimensions:
      - merchant
principles:
  - name: Visibility
    description: Merchants reconcile API-driven activity against Synchrony program reporting; there is no FOCUS export, but transaction- and decision-level reports are available through partner reporting.
  - name: Allocation
    description: Allocate by merchant, channel (e-commerce / POS / mobile), and program; the natural unit is the credit program rather than a per-call line.
  - name: Optimization
    description: Optimize by routing eligible customers through Quickscreen first to reduce hard-pull costs, batching servicing calls, and tuning checkout flow to maximize approved authorization rates.
  - name: Accountability
    description: Merchant program owner and Synchrony partner-management team jointly own commercial reviews and program performance.
maintainers:
