naftiko: 1.0.0-alpha2
info:
  label: Synchrony Financial Quickscreen Apply API — Applications
  description: 'Synchrony Financial Quickscreen Apply API — Applications. 1 operations. Lead operation: Submit Credit Application.
    Self-contained Naftiko capability covering one Synchrony Financial business surface.'
  tags:
  - Synchrony Financial
  - Applications
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SYNCHRONY_FINANCIAL_API_KEY: SYNCHRONY_FINANCIAL_API_KEY
capability:
  consumes:
  - type: http
    namespace: quickscreen-apply-applications
    baseUri: https://api.syf.com
    description: Synchrony Financial Quickscreen Apply API — Applications business capability. Self-contained, no shared references.
    resources:
    - name: v1-credit-applications
      path: /v1/credit/applications
      operations:
      - name: submitapplication
        method: POST
        description: Submit Credit Application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SYNCHRONY_FINANCIAL_API_KEY}}'
  exposes:
  - type: rest
    namespace: quickscreen-apply-applications-rest
    port: 8080
    description: REST adapter for Synchrony Financial Quickscreen Apply API — Applications. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v1/credit/applications
      name: v1-credit-applications
      description: REST surface for v1-credit-applications.
      operations:
      - method: POST
        name: submitapplication
        description: Submit Credit Application
        call: quickscreen-apply-applications.submitapplication
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: quickscreen-apply-applications-mcp
    port: 9090
    transport: http
    description: MCP adapter for Synchrony Financial Quickscreen Apply API — Applications. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: submit-credit-application
      description: Submit Credit Application
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: quickscreen-apply-applications.submitapplication
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
