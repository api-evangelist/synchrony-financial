naftiko: "1.0.0-alpha1"

info:
  label: "Synchrony Financial Credit Authorization API"
  description: "Credit card transaction processing including purchases, preauthorizations, completions, payments, refunds, and reversals for Synchrony credit accounts."
  tags:
    - Credit Authorization
    - Payments
    - Financial Services
    - Retail Finance
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      SYNCHRONY_API_TOKEN: SYNCHRONY_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: synchrony-credit-auth
      baseUri: https://api.syf.com
      description: "Synchrony Financial Credit Authorization API for processing retail credit transactions."
      authentication:
        type: bearer
        token: "{{SYNCHRONY_API_TOKEN}}"
      resources:
        - name: purchases
          path: /v1/authorizations/purchases
          description: "Purchase authorization transactions."
          operations:
            - name: create-purchase
              method: POST
              description: "Initiates a purchase transaction against a Synchrony credit account."
              inputParameters:
                - name: merchantId
                  in: body
                  type: string
                  required: true
                  description: "Merchant Synchrony identifier."
                - name: accountNumber
                  in: body
                  type: string
                  required: true
                  description: "Customer credit account number or payment token."
                - name: amount
                  in: body
                  type: number
                  required: true
                  description: "Transaction amount in dollars."
                - name: channel
                  in: body
                  type: string
                  required: false
                  description: "Transaction channel: web, mobile, or pos."
                - name: merchantOrderId
                  in: body
                  type: string
                  required: false
                  description: "Merchant internal order reference."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  merchantId: "{{tools.merchantId}}"
                  accountNumber: "{{tools.accountNumber}}"
                  amount: "{{tools.amount}}"
                  channel: "{{tools.channel}}"
                  merchantOrderId: "{{tools.merchantOrderId}}"

        - name: preauthorizations
          path: /v1/authorizations/preauthorizations
          description: "Preauthorization hold operations."
          operations:
            - name: create-preauthorization
              method: POST
              description: "Places an authorization hold on a customer's credit account."
              inputParameters:
                - name: merchantId
                  in: body
                  type: string
                  required: true
                  description: "Merchant identifier."
                - name: accountNumber
                  in: body
                  type: string
                  required: true
                  description: "Credit account number or payment token."
                - name: amount
                  in: body
                  type: number
                  required: true
                  description: "Hold amount in dollars."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  merchantId: "{{tools.merchantId}}"
                  accountNumber: "{{tools.accountNumber}}"
                  amount: "{{tools.amount}}"

        - name: completions
          path: /v1/authorizations/completions
          description: "Complete prior preauthorizations."
          operations:
            - name: create-completion
              method: POST
              description: "Completes a prior preauthorization by capturing the final transaction amount."
              inputParameters:
                - name: merchantId
                  in: body
                  type: string
                  required: true
                - name: authorizationCode
                  in: body
                  type: string
                  required: true
                  description: "Original preauthorization code."
                - name: amount
                  in: body
                  type: number
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  merchantId: "{{tools.merchantId}}"
                  authorizationCode: "{{tools.authorizationCode}}"
                  amount: "{{tools.amount}}"

        - name: payments
          path: /v1/authorizations/payments
          description: "Account payment operations."
          operations:
            - name: create-payment
              method: POST
              description: "Processes a payment to a customer's Synchrony credit account."
              inputParameters:
                - name: merchantId
                  in: body
                  type: string
                  required: true
                - name: accountNumber
                  in: body
                  type: string
                  required: true
                - name: amount
                  in: body
                  type: number
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  merchantId: "{{tools.merchantId}}"
                  accountNumber: "{{tools.accountNumber}}"
                  amount: "{{tools.amount}}"

        - name: refunds
          path: /v1/authorizations/refunds
          description: "Refund credit operations."
          operations:
            - name: create-refund
              method: POST
              description: "Processes a refund to a customer's Synchrony credit account."
              inputParameters:
                - name: merchantId
                  in: body
                  type: string
                  required: true
                - name: originalTransactionId
                  in: body
                  type: string
                  required: true
                - name: amount
                  in: body
                  type: number
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  merchantId: "{{tools.merchantId}}"
                  originalTransactionId: "{{tools.originalTransactionId}}"
                  amount: "{{tools.amount}}"

        - name: reversals
          path: /v1/authorizations/reversals
          description: "Transaction reversal operations."
          operations:
            - name: create-reversal
              method: POST
              description: "Voids or reverses a prior transaction."
              inputParameters:
                - name: merchantId
                  in: body
                  type: string
                  required: true
                - name: originalTransactionId
                  in: body
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  merchantId: "{{tools.merchantId}}"
                  originalTransactionId: "{{tools.originalTransactionId}}"

  exposes:
    - type: rest
      port: 8100
      namespace: synchrony-credit-auth-api
      resources:
        - path: /v1/authorizations/purchases
          name: purchases
          operations:
            - method: POST
              name: create-purchase
              description: "Authorize a credit purchase."
              call: "synchrony-credit-auth.create-purchase"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: synchrony-credit-auth-mcp
      transport: http
      tools:
        - name: create-purchase
          description: "Authorize a retail credit purchase on a Synchrony account."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "synchrony-credit-auth.create-purchase"
          outputParameters:
            - type: object
              mapping: "$."
