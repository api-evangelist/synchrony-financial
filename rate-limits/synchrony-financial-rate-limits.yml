specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Synchrony Financial
providerId: synchrony-financial
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Financial Services
  - Credit
  - Payments
  - Rate Limiting
description: Synchrony does not publish standard rate-limit numbers in its public developer documentation. Limits are configured per-merchant during program onboarding and surfaced through sandbox / partner-management channels rather than a public reference page.
sources:
  - https://developer.syf.com/
  - https://developer.syf.com/our-products
notes: No public rate-limit numbers published. Per-merchant throughput is sized during retail-credit program onboarding.
responseCodes:
  throttled: 429
limits:
  - name: Per-Merchant Limits
    scope: merchant
    metric: varies
    limit: 'sized at program onboarding; not publicly documented'
policies:
  - name: Merchant Onboarding
    description: Throughput, retry expectations, and SLA targets are agreed during partner onboarding through developer.syf.com and the Synchrony program team.
  - name: Sandbox vs Production
    description: Sandbox throughput is limited for testing; production limits are activated after program approval.
